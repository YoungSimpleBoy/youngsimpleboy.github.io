<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI 可视化播放器</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <!-- 用于GBK解码的encoding.js -->
    <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>MIDI 可视化播放器</h1>
        <button class="theme-toggle" id="themeToggle" title="切换主题">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
    
    <div class="canvas-wrapper" id="canvasWrapper">
        <button class="canvas-fs-btn" id="canvasFsBtn" type="button" title="全屏显示可视化" aria-label="全屏显示可视化">⛶</button>
        <canvas id="canvas"></canvas>
    </div>
    
    <div class="bottom-controls">
        
        <div class="progress-section">
            <input type="file" id="fileInput" accept=".mid,.midi">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                上传 MIDI 文件
            </button>
            <span class="select-label">  或  </span>
            <div class="custom-select-wrapper">
                <select id="exampleSelect" class="custom-select">
                    <option value="">选择示例...</option>
                    <option value="example_midi/example01.mid">示例 1</option>
                    <option value="example_midi/example02.mid">示例 2</option>
                    <option value="example_midi/example03.mid">示例 3</option>
                    <option value="example_midi/example04.mid">示例 4</option>
                    <option value="example_midi/example05.mid">示例 5</option>
                </select>
            </div>
            <button id="loopBtn" class="loop-btn" type="button" aria-pressed="false" title="循环播放：关闭">
                循环
            </button>
            <button id="playBtn" disabled>
                <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <span id="currentTime">0:00</span>
            <input type="range" id="progressSlider" min="0" max="100" value="0" step="0.1" class="progress-bar">
            <span id="totalTime">0:00</span>
        </div>
        <div class="settings-section">
            <div class="volume-control">
                <span>音量</span>
                <input type="range" id="volumeSlider" min="-40" max="0" value="-6" step="1" class="slider">
                <span id="volumeValue">-6 dB</span>
            </div>
            <div class="volume-control">
                <span>瀑布流速度</span>
                <input type="range" id="speedSlider" min="50" max="350" value="200" step="10" class="slider">
                <span id="speedValue">200</span>
            </div>
            <div class="volume-control">
                <span>辅助信息</span>
                <label class="switch-container">
                    <input type="checkbox" id="infoToggle" checked>
                    <span class="checkmark"></span>
                </label>
            </div>
            <div class="volume-control">
                <span>方向</span>
                <div class="direction-group" id="directionGroup">
                    <button type="button" class="direction-btn active" data-direction="horizontal">水平</button>
                    <button type="button" class="direction-btn" data-direction="vertical">垂直</button>
                </div>
            </div>
            <div class="volume-control playback-rate-control">
                <span>播放速度</span>
                <input type="range" id="playbackRateSlider" min="0.5" max="2" value="1" step="0.25" class="slider">
                <span id="playbackRateValue">×1.0</span>
            </div>
        </div>
    </div>
    
    <p class="status" id="status">请上传 MIDI 文件或选择示例</p>
    <p class="info">空格暂停/继续 | R 重置</p>

    <!-- 音轨控制面板 -->
    <div class="track-panel" id="trackPanel">
        <div class="midi-info" id="midiInfo">
            <span class="midi-info-empty">加载 MIDI 文件后显示文件信息</span>
        </div>
        <div class="track-list" id="trackList">
            <p class="track-empty">加载 MIDI 文件后显示音轨信息</p>
        </div>
    </div>

    <!-- 页脚 -->

        </div>

    </footer>

    <script src="app.js"></script>
</body>
</html>
