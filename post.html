    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
    <script>
        // ====================
        // Post 页面客户端 Markdown 渲染
        // ====================

        let _lastPostInit = 0;

        function getPostId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('p') || '';
        }

        async function getPostMetadata(postId) {
            try {
                const response = await fetch('/index.html');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const articles = doc.querySelectorAll('.post-item');
                for (const article of articles) {
                    const link = article.querySelector('.post-title a');
                    if (!link) continue;
                    const href = link.getAttribute('href') || '';
                    if (href.includes(postId)) {
                        const time = article.querySelector('time');
                        const category = article.querySelector('.post-category');
                        const tags = article.querySelectorAll('.post-tags .tag');
                        const excerpt = article.querySelector('.post-excerpt');
                        return {
                            date: time ? time.getAttribute('datetime') || '' : '',
                            dateText: time ? time.textContent.trim() : '',
                            category: category ? category.textContent.trim() : '',
                            tags: Array.from(tags).map(t => t.textContent.trim()),
                            excerpt: excerpt ? excerpt.textContent.trim() : ''
                        };
                    }
                }
            } catch (e) {
                console.warn('无法获取文章元数据:', e);
            }
            return null;
        }

        function protectMath(md) {
            const blocks = [];
            let i = 0;
            // 保护 $$...$$ 块级公式
            let result = md.replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
                const id = i++;
                blocks.push({ type: 'display', math: math.trim() });
                return `\x00MATHBLOCK${id}\x00`;
            });
            // 保护 $...$ 内联公式
            result = result.replace(/(?<!\$)\$(?!\$)([^$\n]+?)(?<!\$)\$(?!\$)/g, (_, math) => {
                const id = i++;
                blocks.push({ type: 'inline', math: math.trim() });
                return `\x00MATHINLINE${id}\x00`;
            });
            return { text: result, blocks };
        }

        function restoreMath(html, blocks) {
            // 恢复时不需要额外包裹，KaTeX auto-render 会处理
            let result = html;
            blocks.forEach((block, idx) => {
                if (block.type === 'display') {
                    result = result.replace(`\x00MATHBLOCK${idx}\x00`, `$$${block.math}$$`);
                } else {
                    result = result.replace(`\x00MATHINLINE${idx}\x00`, `$${block.math}$`);
                }
            });
            return result;
        }

        function stripTitleFromMarkdown(md) {
            // 提取第一个 # 标题，返回标题文本和去除标题后的正文
            const match = md.match(/^#\s+(.+?)[\r\n]+/);
            if (match) {
                return {
                    title: match[1].trim(),
                    body: md.substring(match[0].length).trim()
                };
            }
            return { title: '', body: md };
        }

        function renderMarkdown(md) {
            marked.setOptions({
                breaks: false,
                gfm: true
            });
            const { text: protectedText, blocks } = protectMath(md);
            let html = marked.parse(protectedText);
            html = restoreMath(html, blocks);
            return html;
        }

        function renderKaTeX(element) {
            try {
                renderMathInElement(element, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false }
                    ],
                    throwOnError: false,
                    strict: false,
                    trust: true
                });
            } catch (e) {
                console.warn('KaTeX 渲染出错:', e);
            }
        }

        async function initPostPage() {
            // 防重复调用（直接访问 + Barba afterEnter 可能同时触发）
            const now = Date.now();
            if (now - _lastPostInit < 300) return;
            _lastPostInit = now;

            const postId = getPostId();
            if (!postId) {
                document.getElementById('postTitle').textContent = '未指定文章';
                document.getElementById('postBody').innerHTML = '<p>请在 URL 中指定文章参数，例如 <code>?p=p2026041801</code></p>';
                document.title = '未找到文章 - YoungSimpleBoy 的博客';
                return;
            }

            const [metadata, mdResponse] = await Promise.all([
                getPostMetadata(postId),
                fetch(`/markdown/posts/${postId}.md`).catch(() => null)
            ]);

            if (!mdResponse || !mdResponse.ok) {
                document.getElementById('postTitle').textContent = '文章未找到';
                document.getElementById('postBody').innerHTML =
                    `<p>文章 <code>${postId}.md</code> 未找到。请检查文件是否存在于 <code>markdown/posts/</code> 目录中。</p>`;
                document.title = '文章未找到 - YoungSimpleBoy 的博客';
                return;
            }

            const markdown = await mdResponse.text();
            const { title, body } = stripTitleFromMarkdown(markdown);

            // 设置页面标题
            document.title = `${title} - YoungSimpleBoy 的博客`;

            // 设置文章大标题
            document.getElementById('postTitle').textContent = title;

            // 设置元数据
            if (metadata) {
                const dateEl = document.getElementById('postDate');
                dateEl.setAttribute('datetime', metadata.date);
                dateEl.textContent = metadata.dateText;
                document.getElementById('postCategory').textContent = metadata.category;

                const tagsContainer = document.getElementById('postTags');
                tagsContainer.innerHTML = '';
                metadata.tags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = tag;
                    tagsContainer.appendChild(span);
                });
            }

            // 渲染 Markdown 正文
            const bodyHtml = renderMarkdown(body);
            document.getElementById('postBody').innerHTML = bodyHtml;

            // 渲染 KaTeX 公式
            renderKaTeX(document.getElementById('postBody'));

            // 初始化图片 Lightbox
            if (typeof initLightbox === 'function') {
                initLightbox();
            }

            // 回到顶部
            window.scrollTo(0, 0);
        }

        // 首次加载（直接访问 post.html）
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPostPage);
        } else {
            initPostPage();
        }
    </script>
